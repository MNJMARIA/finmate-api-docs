openapi: 3.1.0
info:
  version: 1.0.0-oas3.1
  title: Transaction Service API
  description: >-
    API для управління транзакціями в персональній системі фінансового
    планування. Підтримує створення, перегляд, фільтрацію та пагінацію
    транзакцій.
servers:
  - url: https://localhost:8080/api/v1
    description: Dev server
  - url: https://api.finplanai.com/api/v1
    description: Production server
security:
  - bearerAuth: []
paths:
  /transactions:
    get:
      summary: Отримати список транзакцій
      description: >-
        Повертає список транзакцій з підтримкою пагінації, фільтрів та
        сортування
      tags:
        - transactions
      parameters:
        - name: page
          in: query
          description: Номер сторінки
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Кількість елементів на сторінці
          schema:
            type: integer
            default: 20
        - name: category
          in: query
          description: Фільтр за категорією
          schema:
            type: string
        - name: sort
          in: query
          description: Сортування (наприклад date,desc)
          schema:
            type: string
            example: date,desc
      responses:
        '200':
          description: Список транзакцій успішно отримано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedTransactionResponse'
        '401':
          description: Неавторизовано
    post:
      summary: Додати нову транзакцію
      description: Створює нову транзакцію та публікує подію TransactionCreated
      tags:
        - transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreateRequest'
      responses:
        '201':
          description: Транзакція успішно створена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Невалідні дані
        '401':
          description: Неавторизовано
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TransactionCreateRequest:
      type: object
      required:
        - amount
        - type
        - categoryId
        - transactionDate
      properties:
        amount:
          type: number
          format: decimal
          example: 1249.5
        type:
          type: string
          enum:
            - INCOME
            - EXPENSE
          example: EXPENSE
        categoryId:
          type: integer
          example: 12
        description:
          type: string
          example: Купівля ноутбука
        transactionDate:
          type: string
          format: date
          example: '2026-05-03'
    TransactionResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1453
        amount:
          type: number
          example: 1249.5
        type:
          type: string
          example: EXPENSE
        categoryName:
          type: string
          example: Техніка
        description:
          type: string
          example: Купівля ноутбука
        transactionDate:
          type: string
          format: date
          example: '2026-05-03'
        createdAt:
          type: string
          format: date-time
    PagedTransactionResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/TransactionResponse'
        totalElements:
          type: integer
          example: 87
        totalPages:
          type: integer
          example: 5
        size:
          type: integer
          example: 20
        number:
          type: integer
          example: 0